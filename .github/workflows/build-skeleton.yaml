name: Build Skeleton (WP-322 Ф3)

# Workflow_dispatch для детерминированной сборки SS-skeleton по subsection_id.
# Генерирует markdown skeleton из structure-guide-N.md (через build-skeleton.py
# из DS-principles-curriculum) и создаёт PR с новым файлом в staging-v4.

on:
  workflow_dispatch:
    inputs:
      subsection_id:
        description: 'PD.GUIDE.N.SX.SSY (например: PD.GUIDE.1.S6.SS1)'
        required: true
        type: string
      guide_number:
        description: 'Номер руководства 1-4 (для пути docs/ru/personal-new-staging/...)'
        required: true
        type: choice
        options: ['1', '2', '3', '4']
      section_slug:
        description: 'Slug раздела (например: s6-stages-and-gates)'
        required: true
        type: string
      output_filename:
        description: 'Имя файла (без расширения, например: 6.01-five-stages)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout aisystant/docs (staging-v4)
        uses: actions/checkout@v4
        with:
          ref: staging-v4
          path: docs-repo

      - name: Checkout DS-principles-curriculum (for build-skeleton.py + structure)
        uses: actions/checkout@v4
        with:
          repository: aisystant/DS-principles-curriculum
          ref: main
          path: curriculum
          token: ${{ secrets.CURRICULUM_READ_TOKEN || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build skeleton
        id: build
        run: |
          cd curriculum
          GUIDE_NUM="${{ inputs.guide_number }}"
          STRUCTURE_FILE="specs/v4-reference/0${GUIDE_NUM}-structure-guide-${GUIDE_NUM}.md"
          if [[ ! -f "$STRUCTURE_FILE" ]]; then
            echo "ERROR: $STRUCTURE_FILE не найден" >&2
            exit 1
          fi

          # Определяем guide-folder в aisystant/docs (1=1-1-systemic-self-development и т.п.)
          declare -A GUIDE_FOLDERS=(
            [1]="1-1-systemic-self-development"
            [2]="1-2-self-development-methods"
            [3]="1-3-iwe-work-and-development"
            [4]="1-4-systems-thinking-introduction"
          )
          GUIDE_FOLDER="${GUIDE_FOLDERS[$GUIDE_NUM]}"
          OUT_PATH="../docs-repo/docs/ru/personal-new-staging/${GUIDE_FOLDER}/${{ inputs.section_slug }}/${{ inputs.output_filename }}.md"

          mkdir -p "$(dirname "$OUT_PATH")"
          python3 tools/build-skeleton.py \
            --id "${{ inputs.subsection_id }}" \
            --structure "$STRUCTURE_FILE" \
            --out "$OUT_PATH"

          echo "out_path=$OUT_PATH" >> "$GITHUB_OUTPUT"
          echo "out_rel=docs/ru/personal-new-staging/${GUIDE_FOLDER}/${{ inputs.section_slug }}/${{ inputs.output_filename }}.md" >> "$GITHUB_OUTPUT"

      - name: Create PR with skeleton
        uses: peter-evans/create-pull-request@v6
        with:
          path: docs-repo
          branch: skeleton/${{ inputs.subsection_id }}
          base: staging-v4
          title: "skeleton(${{ inputs.subsection_id }}): автосгенерированный draft"
          body: |
            ## Автосборка skeleton (WP-322 Ф3)

            **Subsection:** `${{ inputs.subsection_id }}`
            **Файл:** `${{ steps.build.outputs.out_rel }}`
            **Source:** `aisystant/DS-principles-curriculum/specs/v4-reference/0${{ inputs.guide_number }}-structure-guide-${{ inputs.guide_number }}.md`

            ### Что делать дальше

            1. Заполнить placeholder'ы (`<...>`) реальным содержанием
            2. Проверить локально: `/verify subsection <file>` или `python3 tools/v4-lint.py porter <file>`
            3. Когда 🔴 + 🟡 PASS → этот PR с label `pilot-approved` → merge в staging-v4
            4. После пилотного приёма → PR `staging-v4 → main`

            ### Чеклист автора

            - [ ] Заменил placeholder'ы текстом
            - [ ] Прогнал `v4-lint porter` локально — exit 0
            - [ ] Проверил аналогию: создаёт ли новое понимание (K.2)
            - [ ] Блок «Что дальше» — есть отсылка к горизонту (H.4)
            - [ ] Для ст. 1-2 — конкретика; для ст. 3-5 — связь с надсистемой (I.1/I.2)

            🤖 Generated by `tools/build-skeleton.py` from `aisystant/DS-principles-curriculum`
          commit-message: "skeleton(${{ inputs.subsection_id }}): автосгенерированный draft"
          labels: skeleton-draft, wp-322
          add-paths: |
            ${{ steps.build.outputs.out_rel }}
