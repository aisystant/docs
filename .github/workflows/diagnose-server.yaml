name: Patch Caddy iwe route
on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
    - name: Setup SSH
      env:
        SSH_PRIVATE_KEY: ${{ secrets.NOMAD_SSH_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/nomad_key
        chmod 600 ~/.ssh/nomad_key
    - name: Patch Caddy to route system-school.ru/iwe -> port 9002
      run: |
        ssh -i ~/.ssh/nomad_key -o StrictHostKeyChecking=no root@45.153.191.91 bash << 'SSHEOF'
        set -e
        CADDYFILE=$(ls /etc/caddy/Caddyfile /etc/caddy/caddy_config 2>/dev/null | head -1)
        echo "Using Caddyfile: $CADDYFILE"

        echo "=== Current system-school.ru block ==="
        grep -A 8 "^system-school.ru" "$CADDYFILE"

        if grep -q "handle /iwe" "$CADDYFILE"; then
          echo "handle /iwe already present"
        else
          echo "=== Patching ==="
          cp "$CADDYFILE" "$CADDYFILE.bak"
          sed -i 's|\treverse_proxy http://10.10.0.1:8080|\thandle /iwe {\n\t\treverse_proxy http://10.10.0.1:9002\n\t}\n\n\treverse_proxy http://10.10.0.1:8080|' "$CADDYFILE"
          echo "=== New system-school.ru block ==="
          grep -A 15 "^system-school.ru" "$CADDYFILE"
        fi

        echo "=== Reloading Caddy ==="
        CADDY_BIN=$(find /usr /opt /snap /nix 2>/dev/null -name caddy -type f | head -1)
        echo "caddy binary: ${CADDY_BIN:-not found}"
        systemctl reload caddy 2>/dev/null && echo "systemctl reload OK" || \
          ([ -n "$CADDY_BIN" ] && $CADDY_BIN reload --config "$CADDYFILE" 2>&1) || \
          (kill -USR1 $(pgrep caddy 2>/dev/null) 2>/dev/null && echo "Sent USR1 to caddy")
        sleep 2
        echo "=== Testing live via curl from server ==="
        curl -sI https://system-school.ru/iwe 2>/dev/null | head -5 || true
        curl -s http://10.10.0.1:9002/iwe 2>/dev/null | head -c 80 || true
        SSHEOF
