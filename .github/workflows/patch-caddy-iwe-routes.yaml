name: Patch Caddy iwe routes
on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
    - name: Setup SSH
      env:
        SSH_PRIVATE_KEY: ${{ secrets.NOMAD_SSH_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/nomad_key
        chmod 600 ~/.ssh/nomad_key

    - name: Find Caddy config and patch
      run: |
        ssh -i ~/.ssh/nomad_key -o StrictHostKeyChecking=no root@45.153.191.91 << 'SSHEOF'
          set -e

          echo "=== Caddy process info ==="
          ps aux | grep caddy | grep -v grep || echo "caddy not in ps"
          systemctl status caddy --no-pager 2>/dev/null | head -10 || echo "no systemctl status"

          echo "=== Finding Caddyfile ==="
          find / -name "Caddyfile" 2>/dev/null | grep -v proc || echo "no Caddyfile found"
          find / -name "*.caddy" 2>/dev/null | grep -v proc | head -5 || true

          echo "=== Caddy config dir ==="
          ls /etc/caddy/ 2>/dev/null || echo "/etc/caddy not found"
          ls /var/lib/caddy/ 2>/dev/null || echo "/var/lib/caddy not found"
          ls /home/caddy/ 2>/dev/null || echo "/home/caddy not found"

          echo "=== Caddy API config ==="
          curl -s http://localhost:2019/config/ 2>/dev/null | python3 -m json.tool 2>/dev/null | grep -A5 "system-school" | head -30 || echo "no caddy API"
        SSHEOF
