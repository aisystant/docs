name: Patch Caddy iwe routes
on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
    - name: Configure SSH key
      env:
        SSH_PRIVATE_KEY: ${{ secrets.VKCS_SSH_KEY_DOCS_VM }}
        TARGET_HOST: ${{ secrets.VKCS_SSH_IP_DOCS_VM }}
      run: |
        mkdir -p ~/.ssh
        printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H "$TARGET_HOST" >> ~/.ssh/known_hosts

    - name: Patch Caddyfile and reload
      env:
        TARGET_USER: ${{ secrets.VKCS_USER_DOCS_VM }}
        TARGET_HOST: ${{ secrets.VKCS_SSH_IP_DOCS_VM }}
      run: |
        ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes "$TARGET_USER@$TARGET_HOST" << 'SSHEOF'
          set -e
          CADDYFILE=$(sudo find /etc/caddy /etc /opt -name "Caddyfile" 2>/dev/null | head -1)
          echo "Caddyfile: $CADDYFILE"

          echo "=== Before ==="
          sudo grep "handle /iwe" "$CADDYFILE" || echo "(not found)"

          if sudo grep -qE "handle /iwe[^*]" "$CADDYFILE"; then
            sudo sed -i 's|handle /iwe {|handle /iwe* {|g' "$CADDYFILE"
            echo "=== After ==="
            sudo grep "handle /iwe" "$CADDYFILE"
          else
            echo "Already patched or pattern not found"
            sudo grep "handle /iwe" "$CADDYFILE" || true
          fi

          echo "=== Reloading Caddy ==="
          sudo systemctl reload caddy 2>/dev/null && echo "systemctl reload OK" || \
            sudo kill -USR1 $(pgrep caddy 2>/dev/null) && echo "Sent USR1 to caddy"

          sleep 2
          echo "=== Smoke test ==="
          curl -sI https://system-school.ru/iwe/privacy 2>/dev/null | head -3 || true
        SSHEOF
