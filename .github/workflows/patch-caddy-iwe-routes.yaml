name: Patch Caddy iwe routes
on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
    - name: Setup SSH
      env:
        SSH_PRIVATE_KEY: ${{ secrets.NOMAD_SSH_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/nomad_key
        chmod 600 ~/.ssh/nomad_key

    - name: Patch caddy_config and reload
      run: |
        ssh -i ~/.ssh/nomad_key -o StrictHostKeyChecking=no root@45.153.191.91 << 'SSHEOF'
          set -e
          CADDYFILE=/etc/caddy/caddy_config

          echo "=== Before ==="
          grep "handle /iwe" "$CADDYFILE" || echo "(not found)"

          if grep -qE "handle /iwe[^*]" "$CADDYFILE"; then
            cp "$CADDYFILE" "${CADDYFILE}.bak2"
            sed -i 's|handle /iwe {|handle /iwe* {|g' "$CADDYFILE"
            echo "=== After ==="
            grep "handle /iwe" "$CADDYFILE"
          else
            echo "Already patched or pattern not found — showing full iwe section:"
            grep -B2 -A8 "handle /iwe" "$CADDYFILE" || true
          fi

          echo "=== Reloading Caddy ==="
          systemctl reload caddy && echo "reload OK"

          sleep 2
          echo "=== Smoke test: /iwe/privacy ==="
          curl -sI https://system-school.ru/iwe/privacy 2>/dev/null | head -4 || true
          echo "=== Smoke test: /iwe (must still work) ==="
          curl -sI https://system-school.ru/iwe 2>/dev/null | head -2 || true
        SSHEOF
