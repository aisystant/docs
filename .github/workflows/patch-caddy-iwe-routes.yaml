name: Patch Caddy iwe routes
on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
    - name: Setup SSH
      env:
        SSH_PRIVATE_KEY: ${{ secrets.NOMAD_SSH_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.ssh
        printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/nomad_key
        chmod 600 ~/.ssh/nomad_key

    - name: Patch Caddyfile and reload
      run: |
        ssh -i ~/.ssh/nomad_key -o StrictHostKeyChecking=no root@45.153.191.91 << 'SSHEOF'
          set -e
          CADDYFILE=$(find /etc/caddy /etc /opt -name "Caddyfile" 2>/dev/null | head -1)
          echo "Caddyfile: $CADDYFILE"

          echo "=== Before ==="
          grep "handle /iwe" "$CADDYFILE" || echo "(not found)"

          if grep -qE "handle /iwe[^*]" "$CADDYFILE"; then
            sed -i 's|handle /iwe {|handle /iwe* {|g' "$CADDYFILE"
            echo "=== After ==="
            grep "handle /iwe" "$CADDYFILE"
          else
            echo "Already patched or pattern not found"
            grep "handle /iwe" "$CADDYFILE" || true
          fi

          echo "=== Reloading Caddy ==="
          systemctl reload caddy 2>/dev/null && echo "systemctl reload OK" || \
            kill -USR1 $(pgrep caddy 2>/dev/null) && echo "Sent USR1 to caddy"

          sleep 2
          echo "=== Smoke test ==="
          curl -sI https://system-school.ru/iwe/privacy 2>/dev/null | head -3 || true
        SSHEOF
